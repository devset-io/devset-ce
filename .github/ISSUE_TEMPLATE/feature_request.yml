name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Devset CE? Describe it below. For larger proposals, consider opening a Discussion first.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? What workflow does it improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (API / Engine)
        - Frontend (UI)
        - Pipeline DSL
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: true
