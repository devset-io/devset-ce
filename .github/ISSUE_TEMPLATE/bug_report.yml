name: Bug Report
description: Report a bug in Devset CE
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Open Flow Builder
        2. Add a Kafka send step
        3. Click Execute
        4. See error in ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Devset CE version
      description: Docker image tag or JAR version.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (API / Engine)
        - Frontend (UI)
        - Docker / Deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output, stack traces, or screenshots.
      render: shell
