name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: devset-ce-fe/package-lock.json

      - name: Setup Java 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
          cache-dependency-path: devset-ce-be/gradle.lockfile

      - name: Install FE deps
        working-directory: devset-ce-fe
        run: npm ci --no-audit --no-fund

      - name: Build FE + BE jar
        working-directory: devset-ce-fe
        run: npm run e2e:build

      - name: Start stack + run e2e
        working-directory: devset-ce-fe
        run: npm run e2e:up

      - name: Tear down stack
        if: always()
        working-directory: devset-ce-fe
        run: npm run e2e:down

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: playwright-report
          path: |
            devset-ce-fe/playwright-report/
            devset-ce-fe/test-results/
          retention-days: 7
