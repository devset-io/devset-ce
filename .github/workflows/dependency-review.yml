name: Dependency submission

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'devset-ce-be/**'
      - '.github/workflows/dependency-review.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gradle:
    name: Gradle (devset-ce-be)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - name: Generate and submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          build-root-directory: devset-ce-be
        env:
          # Exclude the Gradle buildscript/plugin classpath (config name: "classpath").
          # It pulls jackson-databind 2.21.2 via spring-boot-gradle-plugin ->
          # spring-boot-buildpack-platform, a build-time-only dependency never shipped
          # in the app. resolutionStrategy on project configs cannot override it, so it
          # leaks into the graph and triggers false Dependabot alerts.
          DEPENDENCY_GRAPH_EXCLUDE_CONFIGURATIONS: '^classpath$'