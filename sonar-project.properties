sonar.projectKey=devset-io_devset-ce
sonar.organization=devset-io

# Main source code only
sonar.sources=devset-ce-be/src/main,devset-ce-fe/src

# Backend tests 
sonar.tests=devset-ce-be/src/test
sonar.test.inclusions=devset-ce-fe/src/**/*.test.ts,devset-ce-fe/src/**/*.test.tsx,devset-ce-fe/src/**/*.spec.ts,devset-ce-fe/src/**/*.spec.tsx

sonar.exclusions=**/build/**,**/dist/**,**/node_modules/**,landing-page/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.java.binaries=devset-ce-be/build/classes
sonar.java.source=25

sonar.javascript.lcov.reportPaths=devset-ce-fe/coverage/lcov.info