<svg width="1400" height="640" viewBox="0 0 1400 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workflow user journey</title>
  <desc id="desc">Flow from schema repo to workflow runs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fff9"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5fbf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2c6f55"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="640" fill="url(#bg)"/>

  <text x="700" y="70" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="800" fill="#0f172a">
    Start: od schemy do uruchomienia workflow
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="150" rx="20" ry="20" width="220" height="280" fill="url(#card)" stroke="#9ed9be" stroke-width="2"/>
    <text x="180" y="200" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#14532d">1</text>
    <text x="180" y="236" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Schema Repo</text>
    <text x="180" y="274" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">Dodaj swoj</text>
    <text x="180" y="300" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">schema JSON</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="150" rx="20" ry="20" width="220" height="280" fill="url(#card)" stroke="#8fd3ff" stroke-width="2"/>
    <text x="440" y="200" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#0c4a6e">2</text>
    <text x="440" y="236" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Flow Builder</text>
    <text x="440" y="274" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">Zbuduj flow</text>
    <text x="440" y="300" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">stage po stage</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="150" rx="20" ry="20" width="220" height="280" fill="url(#card)" stroke="#c3b8ff" stroke-width="2"/>
    <text x="700" y="200" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#5b21b6">3</text>
    <text x="700" y="236" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Playground</text>
    <text x="700" y="274" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">Sprawdz wynik</text>
    <text x="700" y="300" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">i logike flow</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="150" rx="20" ry="20" width="220" height="280" fill="url(#card)" stroke="#ffc48c" stroke-width="2"/>
    <text x="960" y="200" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#9a3412">4</text>
    <text x="960" y="236" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Brokers</text>
    <text x="960" y="274" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">Skonfiguruj host,</text>
    <text x="960" y="300" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">login i polaczenie</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="150" rx="20" ry="20" width="220" height="280" fill="url(#card)" stroke="#84ccaa" stroke-width="2"/>
    <text x="1220" y="200" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#14532d">5</text>
    <text x="1220" y="236" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Workflow Runs</text>
    <text x="1220" y="274" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">Wybierz workflow</text>
    <text x="1220" y="300" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" fill="#334155">i odpal run</text>
  </g>

  <line x1="290" y1="290" x2="320" y2="290" stroke="#2c6f55" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="550" y1="290" x2="580" y2="290" stroke="#2c6f55" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="810" y1="290" x2="840" y2="290" stroke="#2c6f55" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1070" y1="290" x2="1100" y2="290" stroke="#2c6f55" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="390" y="478" rx="14" ry="14" width="620" height="88" fill="#ecfdf5" stroke="#8fd3b4" stroke-width="2"/>
  <text x="700" y="528" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#14532d">
    Najpierw zbuduj i sprawdz, potem uruchamiaj .
  </text>

</svg>
