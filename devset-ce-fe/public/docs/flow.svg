<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-label="Schemat dzialania aplikacji">
  <rect width="1100" height="360" fill="#f8fafc"/>
  <rect x="50" y="85" width="280" height="190" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <rect x="410" y="85" width="280" height="190" rx="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <rect x="770" y="85" width="280" height="190" rx="16" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="190" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#0f172a">Input</text>
  <text x="190" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">event + header</text>
  <text x="550" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#0f172a">Pipeline</text>
  <text x="550" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">stage processing</text>
  <text x="910" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#0f172a">Output</text>
  <text x="910" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">produced events</text>
  <path d="M330 180L410 180" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M690 180L770 180" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12z" fill="#334155"/>
    </marker>
  </defs>
